description: |
  Implement task claim, release, and finish mutations with append-only events.

acceptance:
  - waystation task claim <id> creates an active claim.
  - waystation task release <id> releases the active claim.
  - waystation task finish <id> marks a task done and completes the claim.
  - Mutations append JSONL events.
  - Multiple active claims for one task are rejected unless a future force flag is added.

